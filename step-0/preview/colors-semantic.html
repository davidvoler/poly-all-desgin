<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-latin)}
.row{display:flex;gap:14px;flex-wrap:wrap}
.grp{flex:1;min-width:180px}
.lbl{font-size:11px;color:var(--fg-muted);font-family:ui-monospace,monospace;margin-top:4px}
.title{font-size:13px;font-weight:600;color:var(--fg-strong);margin-bottom:8px}
.tile{padding:10px 12px;border-radius:10px;font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
</style></head><body>
<div class="row">
  <div class="grp"><div class="title">Correct</div>
    <div class="tile" style="background:var(--state-correct-bg);color:var(--state-correct-fg);border:1px solid var(--state-correct-border)">Selected option<span style="color:var(--state-correct-icon)">✓</span></div>
    <div class="lbl">green-50/300/600/800</div>
  </div>
  <div class="grp"><div class="title">Incorrect</div>
    <div class="tile" style="background:var(--state-incorrect-bg);color:var(--state-incorrect-fg);border:1px solid var(--state-incorrect-border)">Selected option<span style="color:var(--state-incorrect-icon)">✕</span></div>
    <div class="lbl">red-50/300/600/800</div>
  </div>
  <div class="grp"><div class="title">Selected</div>
    <div class="tile" style="background:var(--state-selected-bg);color:var(--state-selected-fg);border:1px solid var(--state-selected-border)">Active choice<span>●</span></div>
    <div class="lbl">blue-50/300/800</div>
  </div>
  <div class="grp"><div class="title">Notice</div>
    <div class="tile" style="background:var(--state-warning-bg);color:var(--state-warning-fg);border:1px solid var(--state-warning-border)">Using local questions<span style="color:var(--state-warning-icon)">⚠</span></div>
    <div class="lbl">orange-100/300/700/800</div>
  </div>
</div>
</body></html>
