<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:0;background:#fff;font-family:var(--font-latin);display:grid;grid-template-columns:1fr 1fr 1fr 1fr}
.cell{height:120px;padding:18px;color:var(--fg-strong);display:flex;flex-direction:column;justify-content:space-between}
.t{font-size:13px;font-weight:700}
.s{font-size:11px;color:var(--fg-muted);font-family:ui-monospace,monospace}
</style></head><body>
<div class="cell" style="background:var(--gradient-home)"><div class="t">Home</div><div class="s">blue-50 → indigo-100</div></div>
<div class="cell" style="background:var(--gradient-quiz)"><div class="t">Quiz</div><div class="s">green-50 → teal-100</div></div>
<div class="cell" style="background:var(--gradient-progress)"><div class="t">Progress</div><div class="s">yellow-50 → orange-100</div></div>
<div class="cell" style="background:var(--gradient-courses);border-left:1px solid var(--border-subtle)"><div class="t">Courses</div><div class="s">grey-100 (flat)</div></div>
</body></html>
