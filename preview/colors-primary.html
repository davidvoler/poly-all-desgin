<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-latin);display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start}
.sw{width:130px}
.chip{height:64px;border-radius:12px;box-shadow:var(--shadow-card-compact);display:flex;align-items:flex-end;padding:8px 10px;color:#fff;font-size:11px;font-weight:600}
.chip.lt{color:#212121}
.lbl{font-size:11px;color:var(--fg-muted);margin-top:6px;font-family:ui-monospace,monospace}
.name{font-size:13px;font-weight:600;color:var(--fg-strong);margin-top:2px}
</style></head><body>
<div class="sw"><div class="chip" style="background:var(--color-blue-600)">600</div><div class="name">Primary Blue</div><div class="lbl">#1E88E5</div></div>
<div class="sw"><div class="chip" style="background:var(--color-blue-700)">700</div><div class="name">Hover</div><div class="lbl">#1976D2</div></div>
<div class="sw"><div class="chip lt" style="background:var(--color-blue-300)">300</div><div class="name">Border</div><div class="lbl">#64B5F6</div></div>
<div class="sw"><div class="chip lt" style="background:var(--color-blue-50)">50</div><div class="name">Soft fill</div><div class="lbl">#E3F2FD</div></div>
<div class="sw"><div class="chip" style="background:var(--color-blue-800)">800</div><div class="name">Text on soft</div><div class="lbl">#1565C0</div></div>
</body></html>
