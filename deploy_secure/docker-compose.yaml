services:
  # TLS-terminating nginx for production. Bind-mounts the conf file and
  # per-subdomain web roots read-only — `docker compose up` is enough,
  # no image rebuild on conf changes.
  nginx:
    container_name: polyglots-nginx-tls
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/polyglots.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/www:/usr/share/nginx/html/www:ro
      - ./web/app:/usr/share/nginx/html/app:ro
      - ./web/dashboard:/usr/share/nginx/html/dashboard:ro
      # Certs. Local Mac: `./certs/` is populated by
      # `./certs/generate-local.sh` with self-signed certs in the
      # certbot-style layout. Production: replace this line with
      #   /etc/letsencrypt:/etc/letsencrypt:ro
      # so certbot-managed certs land in the right place automatically.
      - ./certs:/etc/letsencrypt:ro
      # For real Flutter builds, mount the build output instead:
      # - ../dashboard/build/web:/usr/share/nginx/html/dashboard:ro
      # - ../poliglots_app/build/web:/usr/share/nginx/html/app:ro
    restart: unless-stopped
