# Polyglots — TLS-terminating nginx, three subdomains, port 443.
#
# The SSL stanza below matches what `certbot --nginx` writes on the
# production box. Locally we bind-mount `./certs/` at `/etc/letsencrypt`
# so the same paths resolve — see README.md for the self-signed cert
# generator.
#
# /etc/hosts on the Mac:
#     127.0.0.1  www.polyglots.social app.polyglots.social dashboard.polyglots.social

# ---------------------------------------------------------------------------
# Port 80 — redirect everything to HTTPS. A single block handles every
# known host; unknown hosts fall through to the default_server below.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name www.polyglots.social
                app.polyglots.social
                dashboard.polyglots.social;
    return 301 https://$host$request_uri;
}

# Catch-all on port 80: any unknown Host header gets the door closed
# (444 = no response). Stops random scanners from getting redirected.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# Catch-all on port 443: same idea, but TLS handshake must succeed
# first so nginx needs *some* cert to present. Reuse the app cert
# since it's a SAN that already covers every legitimate host.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/app.polyglots.social/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.polyglots.social/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 444;
}

# ---- www.polyglots.social → marketing site (static) ------------------------
server {
    server_name www.polyglots.social;

    root /home/davidle/deploy_test/www;
    index index.html;

    # Marketing pages are flat HTML — no SPA fallback needed.
    location / {
        try_files $uri $uri/ =404;
    }

    listen 443 ssl;                            # managed by Certbot
    listen [::]:443 ssl;                       # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/app.polyglots.social/fullchain.pem;     # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/app.polyglots.social/privkey.pem;       # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                                  # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                                    # managed by Certbot
}

# ---- app.polyglots.social → Flutter learner app (SPA) ----------------------
server {
    server_name app.polyglots.social;

    root /home/davidle/deploy_test/app;
    index index.html;

    # Long-cache hashed Flutter build assets (main.dart.js, *.png, etc.)
    # but never the entrypoint — flutter rewrites index.html on every
    # build and we want clients to pick up new bundles immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;                            # managed by Certbot
    listen [::]:443 ssl;                       # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/app.polyglots.social/fullchain.pem;     # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/app.polyglots.social/privkey.pem;       # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                                  # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                                    # managed by Certbot
}

# ---- dashboard.polyglots.social → Flutter school-admin app (SPA) -----------
server {
    server_name dashboard.polyglots.social;

    root /home/davidle/deploy_test/dashboard;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;                            # managed by Certbot
    listen [::]:443 ssl;                       # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/app.polyglots.social/fullchain.pem;     # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/app.polyglots.social/privkey.pem;       # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                                  # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                                    # managed by Certbot
}

