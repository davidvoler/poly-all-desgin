<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Polyglots — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #4c1d95, #be185d);
      color: white;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    h1 { font-size: 48px; margin: 18px 0 8px; }
    p { opacity: 0.7; }
    code { background: rgba(255,255,255,0.10); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div style="text-align:center; max-width: 520px; padding: 32px;">
    <div class="badge">dashboard</div>
    <h1>School Dashboard</h1>
    <p>Flutter admin build will live here.</p>
    <p>Served from <code>dashboard.polyglots.social</code></p>
  </div>
</body>
</html>
