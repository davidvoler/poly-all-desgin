 services:
  postgres:
    container_name: postgres
    image: postgres:17.4
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: polyglots
      POSTGRES_PASSWORD: polyglots
      POSTGRES_DB: polyglots
      shared_buffers: 4GB 
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    shm_size: 4GB
  postgres_content:
    container_name: postgres_content
    image: postgres:17.4
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: polyglots
      POSTGRES_PASSWORD: polyglots
      POSTGRES_DB: polyglots
      shared_buffers: 4GB 
    volumes:
      - ./data/postgres_full:/var/lib/postgresql/data
    shm_size: 4GB


  server:
    container_name: server
    image: server:polyglots
    build:
      context: server
      dockerfile: Dockerfile.dev
    ports:
      - 8004:8004
    volumes:
      - ./server/src:/app
    environment:
      - POSTGRES_DB=polyglots
      - POSTGRES_PORT=5432
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=polyglots
      - POSTGRES_PASSWORD=polyglots
      # Auth0 — leave blank to disable. When AUTH0_DOMAIN is set, the
      # /api/v1/school_users/login_auth0 route verifies ID tokens
      # against the tenant JWKS; otherwise it returns 503 and the
      # dashboard falls back to the local password flow.
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
    command: 
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8004"
      - --reload
    depends_on:
      - postgres



  audio-server:
    container_name: audio-server
    image: nginx:alpine
    ports:
      - "0.0.0.0:3002:3002"
    volumes:
      - ./conf/audio.conf:/etc/nginx/conf.d/default.conf
      - ./data/audio:/usr/share/nginx/audio/audio
