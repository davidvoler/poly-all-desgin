<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Polyglots — Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../step-1/colors_and_type.css" />
<link rel="stylesheet" href="app.css" />
<style>
  .top.quiz-top {
    margin-bottom: 18px;
    gap: 12px;
  }
  .quiz-progress {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .quiz-progress .progress-bar {
    flex: 1;
    height: 8px;
  }
  .quiz-progress .count {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .lives {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
  }
  .lives .heart {
    font-family: var(--font-icon);
    font-size: 14px;
    color: var(--color-red-400);
  }

  .qnav {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding: 6px 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 999px;
  }
  .qnav-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.16);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-default);
    flex-shrink: 0;
  }
  .qnav-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .qnav-btn .ic {
    font-family: var(--font-icon);
    font-size: 16px;
  }
  .qnav .label {
    flex: 1;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
  }

  .prompt-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    text-align: center;
    margin-bottom: 12px;
  }

  .prompt {
    text-align: center;
    margin-bottom: 18px;
    padding: 16px 16px;
    border-radius: 18px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(28px) saturate(140%);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.14);
  }
  .prompt .word-jp {
    font-family: var(--font-jp);
    font-size: 40px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.02em;
    text-shadow: 0 4px 18px rgba(0,0,0,0.4);
    margin-bottom: 6px;
  }
  .prompt .romaji {
    font-size: 13px;
    font-style: italic;
    color: rgba(255,255,255,0.75);
  }
  .prompt .audio-btn {
    margin-top: 8px;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    font-family: var(--font-icon);
    font-size: 17px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .answers {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: auto;
  }
  .tile {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.14);
    cursor: pointer;
    transition: transform var(--duration-base) var(--ease-standard),
                background-color var(--duration-base) var(--ease-standard),
                border-color var(--duration-base) var(--ease-standard);
  }
  .tile:hover { transform: translateY(-1px); }
  .tile .key {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.20);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    flex-shrink: 0;
  }
  .tile .label {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
  }

  .tile.selected {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.45);
    box-shadow: 0 6px 18px rgba(0,0,0,0.20);
  }
  .tile.selected .key {
    background: #fff;
    border-color: #fff;
    color: var(--brand-primary);
  }

  .cta-row {
    margin-top: 14px;
    padding-top: 4px;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="page">

      <div class="top quiz-top">
        <a class="icon-btn" href="course.html" aria-label="Close" style="text-decoration:none;">close</a>
        <div class="quiz-progress">
          <div class="progress-bar"><div class="fill" style="width:40%"></div></div>
          <div class="count">4 / 10</div>
        </div>
        <div class="lives">
          <span class="heart">favorite</span>
          3
        </div>
      </div>

      <div class="qnav">
        <button class="qnav-btn" aria-label="Previous question">
          <span class="ic">arrow_back</span>
          Back
        </button>
        <div class="label">
          Question 4
        </div>
        <button class="qnav-btn" aria-label="Skip question">
          Skip
          <span class="ic">arrow_forward</span>
        </button>
      </div>

      <div class="prompt-label">— Translate this word —</div>

      <div class="prompt">
        <div class="word-jp">ありがとう</div>
        <div class="romaji">arigatō</div>
        <button class="audio-btn" aria-label="Play audio">volume_up</button>
      </div>

      <div class="answers">
        <div class="tile">
          <span class="key">A</span>
          <span class="label">Hello</span>
        </div>
        <div class="tile selected">
          <span class="key">B</span>
          <span class="label">Thank you</span>
        </div>
        <div class="tile">
          <span class="key">C</span>
          <span class="label">Goodbye</span>
        </div>
        <div class="tile">
          <span class="key">D</span>
          <span class="label">Please</span>
        </div>
      </div>

      <div class="cta-row">
        <button class="cta">
          Check answer
          <span class="icon">arrow_forward</span>
        </button>
      </div>

    </div>
  </div>
</body>
</html>
