<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Polyglots — Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../step-1/colors_and_type.css" />
<link rel="stylesheet" href="app.css" />
<style>
  /* Wrap medallion + course-cap as one clickable region */
  .course-link {
    display: block;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform var(--duration-base) var(--ease-standard);
  }
  .course-link:hover { transform: translateY(-1px); }

  .medallion {
    position: relative;
    margin: 4px auto 16px auto;
    width: 168px;
    height: 168px;
  }
  .medallion svg { transform: rotate(-90deg); position: absolute; inset: 0; }
  .medallion .glow {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(closest-side, rgba(255,255,255,0.10), transparent 70%);
    filter: blur(10px);
  }
  .medallion .disc {
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.10);
  }
  .medallion .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .medallion .flag-pair {
    font-size: 13px;
    letter-spacing: 0.30em;
    margin-bottom: 5px;
    opacity: 0.85;
  }
  .medallion .native {
    font-family: var(--font-jp);
    font-size: 44px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.02em;
    text-shadow: 0 4px 18px rgba(0,0,0,0.5);
  }
  .medallion .pct {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    margin-top: 7px;
  }

  /* Course caption — frosted plate, with subtle "tap to change" affordance */
  .course-cap {
    text-align: center;
    margin: 0 auto 16px auto;
    padding: 8px 14px 10px 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.10);
    width: fit-content;
    max-width: 90%;
    position: relative;
    transition: background-color var(--duration-base) var(--ease-standard),
                border-color var(--duration-base) var(--ease-standard);
  }
  .course-link:hover .course-cap {
    background: rgba(255,255,255,0.10);
    border-color: rgba(255,255,255,0.22);
  }
  .course-cap .lang-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .course-cap h2 {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin: 5px 0 2px 0;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  .course-cap .module {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
  }
  .course-cap .change-hint {
    margin-top: 6px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .course-cap .change-hint .ic {
    font-family: var(--font-icon);
    font-size: 12px;
  }

  /* Stats */
  .stats {
    display: flex;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(28px) saturate(140%);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .seg {
    flex: 1;
    text-align: center;
    padding: 10px 4px;
    border-right: 1px solid rgba(255,255,255,0.10);
  }
  .seg:last-child { border-right: none; }
  .seg .v {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.02em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.30);
  }
  .seg .l {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    margin-top: 4px;
  }
  .stats-label {
    text-align: center;
    margin-bottom: 7px;
    color: rgba(255,255,255,0.5);
  }

  .cta-row {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* The CTA is now an anchor — keep visuals identical */
  a.cta {
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="mosaic">
      <span class="word w1">こんにちは</span>
      <span class="word w2">ありがとう</span>
      <span class="word w3">日本</span>
      <span class="word w4">学校</span>
      <span class="word w5">すみません</span>
      <span class="word w6">食べる</span>
      <span class="word w7">本</span>
      <span class="word w8">先生</span>
      <span class="word w9">はじめまして</span>
      <span class="word w10">水</span>
      <span class="word w11">友達</span>
      <span class="word w12">おはよう</span>
      <span class="word w13">学</span>
    </div>

    <div class="page">

      <div class="top">
        <div class="brand">polyglots</div>
        <div class="streak">
          <span class="dot"></span>
          5 day streak
        </div>
      </div>

      <!-- Click anywhere on medallion + caption to change course/languages -->
      <a class="course-link" href="courses.html">
        <div class="medallion">
          <div class="glow"></div>
          <div class="disc"></div>
          <svg width="168" height="168" viewBox="0 0 168 168">
            <circle cx="84" cy="84" r="74" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
            <circle cx="84" cy="84" r="74" fill="none" stroke="#fff" stroke-width="3"
              stroke-linecap="round"
              stroke-dasharray="465"
              stroke-dashoffset="256"/>
          </svg>
          <div class="center">
            <div class="flag-pair">🇺🇸 → 🇯🇵</div>
            <div class="native">日本語</div>
            <div class="pct">45% Complete</div>
          </div>
        </div>

        <div class="course-cap">
          <div class="lang-label">Japanese · Nihongo</div>
          <h2>Japanese for Beginners</h2>
          <div class="module">Module 3 · Greetings &amp; Introductions</div>
          <div class="change-hint">
            <span class="ic">tune</span>
            tap to change
          </div>
        </div>
      </a>

      <div class="section-label stats-label">— Your Vocabulary —</div>
      <div class="stats">
        <div class="seg">
          <div class="v">248</div>
          <div class="l">Words</div>
        </div>
        <div class="seg">
          <div class="v">12</div>
          <div class="l">Lessons</div>
        </div>
        <div class="seg">
          <div class="v">86</div>
          <div class="l">Sentences</div>
        </div>
      </div>

      <div class="cta-row">
        <!-- Practice Now → goes straight to current lesson (quiz page) -->
        <a class="cta" href="quiz.html">
          <span class="icon">play_arrow</span>
          Practice Now
        </a>
        <a class="icon-btn" href="courses.html" aria-label="Settings" style="text-decoration:none;">tune</a>
      </div>

    </div>
  </div>
</body>
</html>
