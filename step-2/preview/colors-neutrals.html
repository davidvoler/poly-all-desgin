<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-latin);display:flex;gap:14px;flex-wrap:wrap}
.sw{width:108px}
.chip{height:54px;border-radius:10px;box-shadow:var(--shadow-card-compact);display:flex;align-items:flex-end;padding:6px 8px;color:#fff;font-size:10px;font-weight:600}
.chip.lt{color:#212121}
.lbl{font-size:10px;color:var(--fg-muted);margin-top:4px;font-family:ui-monospace,monospace}
.name{font-size:11px;font-weight:600;color:var(--fg-strong);margin-top:2px}
</style></head><body>
<div class="sw"><div class="chip lt" style="background:var(--color-grey-50)">50</div><div class="name">grey-50</div><div class="lbl">#FAFAFA</div></div>
<div class="sw"><div class="chip lt" style="background:var(--color-grey-100)">100</div><div class="name">grey-100</div><div class="lbl">#F5F5F5</div></div>
<div class="sw"><div class="chip lt" style="background:var(--color-grey-200)">200</div><div class="name">border-subtle</div><div class="lbl">#EEEEEE</div></div>
<div class="sw"><div class="chip lt" style="background:var(--color-grey-300)">300</div><div class="name">border</div><div class="lbl">#E0E0E0</div></div>
<div class="sw"><div class="chip lt" style="background:var(--color-grey-400)">400</div><div class="name">disabled</div><div class="lbl">#BDBDBD</div></div>
<div class="sw"><div class="chip" style="background:var(--color-grey-500)">500</div><div class="name">subtle</div><div class="lbl">#9E9E9E</div></div>
<div class="sw"><div class="chip" style="background:var(--color-grey-600)">600</div><div class="name">muted</div><div class="lbl">#757575</div></div>
<div class="sw"><div class="chip" style="background:var(--color-grey-700)">700</div><div class="name">default</div><div class="lbl">#616161</div></div>
<div class="sw"><div class="chip" style="background:var(--color-grey-800)">800</div><div class="name">strong</div><div class="lbl">#424242</div></div>
</body></html>
