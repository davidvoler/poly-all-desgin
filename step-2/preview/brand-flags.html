<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-latin);display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:center;gap:14px;font-size:18px;color:var(--fg-strong)}
.flag{font-size:32px}
.arrow{color:var(--fg-subtle);font-size:24px}
.name{font-weight:600}
.native{color:var(--fg-muted);font-size:14px;margin-left:6px}
</style></head><body>
<div class="row"><span class="flag">🇯🇵</span><span class="name">Japanese</span><span class="native">日本語</span><span class="arrow">→</span><span class="flag">🇪🇸</span><span class="name">Spanish</span><span class="native">Español</span></div>
<div class="row"><span class="flag">🇸🇦</span><span class="name">Arabic</span><span class="native" dir="rtl" style="font-family:var(--font-arabic)">العربية</span><span class="arrow">→</span><span class="flag">🇮🇱</span><span class="name">Hebrew</span><span class="native" dir="rtl" style="font-family:var(--font-hebrew)">עברית</span></div>
<div class="row"><span class="flag">🇨🇳</span><span class="name">Chinese</span><span class="native" style="font-family:var(--font-cjk)">中文</span><span class="arrow">→</span><span class="flag">🇺🇸</span><span class="name">English</span></div>
</body></html>
