<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Concept 1 — Calm Card Stack</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../step-1/colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-default);
    background: #ECEFF4;
    color: var(--fg-strong);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px;
  }

  /* Phone frame */
  .phone {
    width: 100%;
    max-width: 420px;
    border-radius: 36px;
    background: var(--gradient-home);
    box-shadow: 0 20px 60px rgba(30, 50, 90, 0.18);
    overflow: hidden;
    position: relative;
    min-height: 860px;
  }

  .page {
    padding: 28px 24px 120px 24px;
  }

  .header {
    margin-bottom: 28px;
  }
  .greeting {
    font-size: 14px;
    color: var(--fg-muted);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .name-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }
  .name-row h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--fg-strong);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--color-white);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-card-compact);
    font-weight: 600;
    color: var(--brand-primary);
  }

  .card {
    background: var(--bg-surface);
    border-radius: var(--radius-card);
    padding: 24px;
    box-shadow: var(--shadow-card);
    margin-bottom: 16px;
  }

  .course-card .label {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--brand-primary);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .course-card .title {
    font-size: 22px;
    font-weight: 700;
    color: var(--fg-strong);
    margin: 0 0 16px 0;
    letter-spacing: -0.01em;
  }
  .lang-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .lang-row .flag {
    font-size: 28px;
  }
  .lang-row .arrow {
    color: var(--fg-subtle);
    font-size: 18px;
  }
  .lang-row .meta {
    font-size: 14px;
    color: var(--fg-muted);
    margin-left: auto;
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--fg-muted);
    margin-bottom: 8px;
  }
  .progress-row strong {
    color: var(--fg-strong);
    font-weight: 600;
  }
  .bar {
    height: 8px;
    background: var(--color-grey-200);
    border-radius: var(--radius-pill);
    overflow: hidden;
  }
  .bar > span {
    display: block;
    height: 100%;
    background: var(--brand-primary);
    border-radius: var(--radius-pill);
    width: 45%;
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--bg-surface);
    border-radius: var(--radius-card);
    padding: 18px 16px;
    box-shadow: var(--shadow-card-compact);
    text-align: left;
  }
  .stat .value {
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    color: var(--brand-primary);
    letter-spacing: -0.02em;
  }
  .stat .label {
    font-size: 12px;
    color: var(--fg-muted);
    margin-top: 8px;
    font-weight: 500;
  }
  .stat:nth-child(2) .value { color: var(--state-correct-icon); }
  .stat:nth-child(3) .value { color: var(--accent-translit); }

  /* Today summary */
  .today {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg-surface);
    border-radius: var(--radius-card);
    padding: 18px 20px;
    box-shadow: var(--shadow-card-compact);
    margin-bottom: 24px;
  }
  .today .ring {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: conic-gradient(var(--brand-primary) 60%, var(--color-grey-200) 0);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .today .ring-inner {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--bg-surface);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    color: var(--fg-strong);
    font-size: 14px;
  }
  .today .copy .t1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--fg-strong);
  }
  .today .copy .t2 {
    font-size: 13px;
    color: var(--fg-muted);
    margin-top: 2px;
  }

  /* Practice CTA */
  .cta {
    position: absolute;
    bottom: 32px;
    left: 24px;
    right: 24px;
  }
  .practice-btn {
    width: 100%;
    background: var(--brand-primary);
    color: var(--color-white);
    border: none;
    border-radius: var(--radius-button);
    padding: 18px 20px;
    font-size: 17px;
    font-weight: 600;
    font-family: var(--font-default);
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(30, 136, 229, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform var(--duration-base) var(--ease-standard);
  }
  .practice-btn:hover {
    background: var(--brand-primary-hover);
    transform: translateY(-1px);
  }
  .practice-btn .icon {
    font-family: var(--font-icon);
    font-size: 22px;
  }

  /* Bottom nav */
  .bottom-nav {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 0;
    pointer-events: none;
  }

  .label-tag {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg-muted);
    font-weight: 600;
    margin: 0 0 8px 4px;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="page">

      <div class="header">
        <div class="greeting">Tuesday, May 6</div>
        <div class="name-row">
          <h1>Hi, David</h1>
          <div class="avatar">D</div>
        </div>
      </div>

      <p class="label-tag">Current Course</p>
      <div class="card course-card">
        <div class="title">Japanese for Beginners</div>
        <div class="lang-row">
          <span class="flag">🇺🇸</span>
          <span class="arrow">→</span>
          <span class="flag">🇯🇵</span>
          <span class="meta">Module 3 · Lesson 2</span>
        </div>
        <div class="progress-row">
          <span>Course progress</span>
          <strong>45%</strong>
        </div>
        <div class="bar"><span></span></div>
      </div>

      <p class="label-tag">Your Progress</p>
      <div class="stats">
        <div class="stat">
          <div class="value">248</div>
          <div class="label">Words</div>
        </div>
        <div class="stat">
          <div class="value">12</div>
          <div class="label">Lessons</div>
        </div>
        <div class="stat">
          <div class="value">86</div>
          <div class="label">Sentences</div>
        </div>
      </div>

      <div class="today">
        <div class="ring"><div class="ring-inner">12</div></div>
        <div class="copy">
          <div class="t1">12 of 20 today</div>
          <div class="t2">Keep going — 8 questions to your daily goal</div>
        </div>
      </div>

      <div class="cta">
        <button class="practice-btn">
          <span class="icon">play_arrow</span>
          Practice
        </button>
      </div>

    </div>
  </div>
</body>
</html>
