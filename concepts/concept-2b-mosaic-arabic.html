<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Concept 2B — Vocabulary Mosaic · Arabic</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../step-1/colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-default);
    background: #0c0f1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px;
  }

  .phone {
    width: 100%;
    max-width: 420px;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
    min-height: 860px;
    background:
      radial-gradient(140% 80% at 50% 100%, #1E88E5 0%, #1565C0 25%, #0D47A1 55%, #0c0f1a 100%);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
  }

  /* Mosaic of learned vocabulary — Arabic */
  .mosaic {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    user-select: none;
  }
  .word {
    position: absolute;
    font-family: var(--font-arabic);
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.01em;
    white-space: nowrap;
    direction: rtl;
  }
  /* Hand-placed positions/sizes for visual rhythm */
  .w1  { top: 4%;   left: -2%;  font-size: 56px; opacity: 0.10; }
  .w2  { top: 8%;   right: 6%;  font-size: 24px; opacity: 0.30; transform: rotate(-2deg); }
  .w3  { top: 17%;  left: 8%;   font-size: 32px; opacity: 0.18; }
  .w4  { top: 24%;  right: -4%; font-size: 78px; opacity: 0.07; }
  .w5  { top: 31%;  left: 4%;   font-size: 22px; opacity: 0.45; }
  .w6  { top: 36%;  right: 12%; font-size: 28px; opacity: 0.22; }
  .w7  { top: 44%;  left: -3%;  font-size: 96px; opacity: 0.06; }
  .w8  { top: 56%;  right: 4%;  font-size: 34px; opacity: 0.20; }
  .w9  { top: 65%;  left: 10%;  font-size: 24px; opacity: 0.42; }
  .w10 { top: 72%;  right: 8%;  font-size: 60px; opacity: 0.10; }
  .w11 { top: 80%;  left: 4%;   font-size: 30px; opacity: 0.28; }
  .w12 { top: 88%;  right: 14%; font-size: 22px; opacity: 0.50; }
  .w13 { top: 92%;  left: 16%;  font-size: 50px; opacity: 0.10; }

  .mosaic::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(60% 40% at 50% 48%, rgba(13, 71, 161, 0.55) 0%, rgba(13, 71, 161, 0) 70%);
  }

  .page {
    position: relative;
    padding: 32px 28px 32px 28px;
    min-height: 860px;
    display: flex;
    flex-direction: column;
    color: #fff;
    z-index: 1;
  }

  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 56px;
  }
  .brand {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .streak {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 6px 12px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 600;
    color: #fff;
  }
  .streak .dot {
    width: 8px; height: 8px;
    background: var(--color-orange-300);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--color-orange-300);
  }

  /* Center medallion */
  .medallion {
    position: relative;
    margin: 16px auto 24px auto;
    width: 240px;
    height: 240px;
  }
  .medallion svg { transform: rotate(-90deg); position: absolute; inset: 0; }
  .medallion .glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(closest-side, rgba(255,255,255,0.18), transparent 70%);
    filter: blur(8px);
  }
  .medallion .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .medallion .flag-pair {
    font-size: 18px;
    letter-spacing: 0.32em;
    margin-bottom: 8px;
    opacity: 0.85;
  }
  .medallion .native {
    font-family: var(--font-arabic);
    font-size: 56px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.01em;
    text-shadow: 0 4px 24px rgba(0,0,0,0.4);
    direction: rtl;
  }
  .medallion .pct {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    margin-top: 10px;
  }

  /* Course caption */
  .course-cap {
    text-align: center;
    margin-bottom: 28px;
  }
  .course-cap .lang-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .course-cap h2 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin: 8px 0 4px 0;
    letter-spacing: -0.01em;
  }
  .course-cap .module {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
  }

  /* Stats — segmented capsule */
  .stats {
    display: flex;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 22px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .seg {
    flex: 1;
    text-align: center;
    padding: 16px 6px;
    border-right: 1px solid rgba(255,255,255,0.10);
  }
  .seg:last-child { border-right: none; }
  .seg .v {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .seg .l {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-top: 6px;
  }

  .cta-row {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .practice {
    flex: 1;
    background: #fff;
    color: var(--brand-primary);
    border: none;
    border-radius: var(--radius-pill);
    padding: 18px 24px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.30);
    font-family: var(--font-default);
    transition: transform var(--duration-base) var(--ease-standard);
  }
  .practice:hover { transform: translateY(-2px); }
  .practice .icon {
    font-family: var(--font-icon);
    font-size: 22px;
  }
  .icon-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    font-family: var(--font-icon);
    font-size: 24px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .stats-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    text-align: center;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="mosaic">
      <span class="word w1">مرحبا</span>
      <span class="word w2">شكراً</span>
      <span class="word w3">كتاب</span>
      <span class="word w4">مدرسة</span>
      <span class="word w5">صباح الخير</span>
      <span class="word w6">قهوة</span>
      <span class="word w7">بيت</span>
      <span class="word w8">معلّم</span>
      <span class="word w9">من فضلك</span>
      <span class="word w10">ماء</span>
      <span class="word w11">صديق</span>
      <span class="word w12">عفواً</span>
      <span class="word w13">لغة</span>
    </div>

    <div class="page">

      <div class="top">
        <div class="brand">polyglots</div>
        <div class="streak">
          <span class="dot"></span>
          5 day streak
        </div>
      </div>

      <div class="medallion">
        <div class="glow"></div>
        <svg width="240" height="240" viewBox="0 0 240 240">
          <circle cx="120" cy="120" r="106" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="6"/>
          <circle cx="120" cy="120" r="106" fill="none" stroke="#fff" stroke-width="6"
            stroke-linecap="round"
            stroke-dasharray="666"
            stroke-dashoffset="366"/>
        </svg>
        <div class="center">
          <div class="flag-pair">🇺🇸 → 🇸🇦</div>
          <div class="native">العربية</div>
          <div class="pct">45% Complete</div>
        </div>
      </div>

      <div class="course-cap">
        <div class="lang-label">Arabic · Al-ʿArabiyyah</div>
        <h2>Arabic for Beginners</h2>
        <div class="module">Module 3 · Greetings &amp; Introductions</div>
      </div>

      <div class="stats-label">— Your Vocabulary —</div>
      <div class="stats">
        <div class="seg">
          <div class="v">248</div>
          <div class="l">Words</div>
        </div>
        <div class="seg">
          <div class="v">12</div>
          <div class="l">Lessons</div>
        </div>
        <div class="seg">
          <div class="v">86</div>
          <div class="l">Sentences</div>
        </div>
      </div>

      <div class="cta-row">
        <button class="practice">
          <span class="icon">play_arrow</span>
          Practice Now
        </button>
        <button class="icon-btn" aria-label="Settings">tune</button>
      </div>

    </div>
  </div>
</body>
</html>
