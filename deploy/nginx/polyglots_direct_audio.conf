    ssl_certificate_key /etc/letsencrypt/live/dashboard.polyglots.social/privkey.pem;       # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                                  # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                                    # managed by Certbot
}

server {
    server_name audio.polyglots.social;

    root  /home/davidle/new_data/audio;
    index index.html;   # harmless; only used if a directory is requested

    # ---- MIME types -------------------------------------------------
    # nginx's bundled mime.types covers .mp3, but pinning here makes
    # the intent explicit and adds a few formats that aren't always
    # included in stripped-down builds.
    types {
        audio/mpeg  mp3;
        audio/mp4   m4a;
        audio/ogg   ogg oga;
        audio/wav   wav;
        audio/webm  weba;
    }
    default_type application/octet-stream;

    # ---- CORS + Range (apply to all locations below) ---------------
    # Static audio is public — `Allow-Origin: *` is the conventional
    # answer. Tighten to specific origins if you ever need credentials
    # (but you can't combine `*` with Allow-Credentials, so don't).
    add_header Access-Control-Allow-Origin   "*"                                                  always;
    add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS"                                 always;
    add_header Access-Control-Allow-Headers  "Range"                                              always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges"       always;
    add_header Accept-Ranges                 bytes                                                always;

    # ---- Audio files (the main path) -------------------------------
    location / {
        # Hard 404 on missing files — never fall through to a HTML
        # error page; Chrome's audio decoder treats any non-audio
        # body as `DEMUXER_ERROR_COULD_NOT_OPEN`.
        try_files $uri =404;

        # Long-cache; hashed filenames make this safe.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Re-assert CORS in this scope. `add_header` doesn't inherit
        # across nested blocks once the location declares any of its
        # own headers, so we restate the cross-origin ones explicitly.
        add_header Access-Control-Allow-Origin   "*"                                            always;
        add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS"                           always;
        add_header Access-Control-Allow-Headers  "Range"                                        always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;
        add_header Accept-Ranges                 bytes                                          always;
    }

    # ---- Preflight short-circuit -----------------------------------
    # Browsers preflight an OPTIONS when the page uses
    # `crossorigin="anonymous"` or asks for `Range`. Answer 204 with
    # CORS headers and no body so nothing else has to handle it.
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin   "*"                                            always;
        add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS"                           always;
        add_header Access-Control-Allow-Headers  "Range"                                        always;
        add_header Access-Control-Max-Age        "86400"                                        always;
        add_header Content-Length                0                                              always;
        return 204;
    }

    # ---- Gzip — skip for audio, the bytes are already compressed --
    gzip off;

    # Larger send buffers help streaming throughput on real-world links.
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    output_buffers    2 1m;

    listen      443 ssl;                       # managed by Certbot
    listen [::]:443 ssl;                       # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/audio.polyglots.social/fullchain.pem;     # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/audio.polyglots.social/privkey.pem;       # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                                    # managed by Certbot
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;                              # managed by Certbot
}


server {
    server_name api.polyglots.social;

    location / {
        proxy_pass http://127.0.0.1:8801;   # was: http://server:8801
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate     /etc/letsencrypt/live/api.polyglots.social/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.polyglots.social/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}