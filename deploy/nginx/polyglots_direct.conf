server {
    server_name api.polyglots.social;

    location / {
        proxy_pass http://127.0.0.1:8801;   # was: http://server:8801
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate     /etc/letsencrypt/live/api.polyglots.social/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.polyglots.social/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}