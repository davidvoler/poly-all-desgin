services:
  # Single nginx that fronts every subdomain. Mounts the conf file and
  # the per-subdomain web roots read-only so a `docker compose up` is
  # all you need — no rebuilding the image on every config change.
  nginx:
    container_name: polyglots-nginx
    image: nginx:alpine
    ports:
      - "8085:8085"
      # Uncomment when you add TLS termination (see README.md).
      # - "443:443"
    volumes:
      - ./nginx/polyglots.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/www:/usr/share/nginx/html/www:ro
      - ./web/app:/usr/share/nginx/html/app:ro
      - ./web/dashboard:/usr/share/nginx/html/dashboard:ro
      # For real Flutter builds, mount the build output instead:
      # - ../dashboard/build/web:/usr/share/nginx/html/dashboard:ro
      # - ../poliglots_app/build/web:/usr/share/nginx/html/app:ro
    restart: unless-stopped
