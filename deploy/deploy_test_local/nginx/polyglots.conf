# Polyglots — single nginx, three subdomains, one port.
#
# Local testing (via /etc/hosts):
#     127.0.0.1  www.polyglots.social app.polyglots.social dashboard.polyglots.social
# then `docker compose up` from this folder and open the URLs in a browser.
#
# Production: bump these to `listen 443 ssl http2;`, add the certbot
# bind-mount, and add an HTTP→HTTPS redirect block. See README.md.

# Catch-all: any unknown Host header gets the door closed (444 = no
# response). Stops random scanners from getting the first server block
# by default.
server {
    listen 8085 default_server;
    server_name _;
    return 444;
}

# ---- www.polyglots.social → marketing site (static) ------------------------
server {
    listen 8085;
    server_name www.polyglots1.social;

    root /usr/share/nginx/html/www;
    index index.html;

    # Marketing pages are flat HTML — no SPA fallback needed.
    location / {
        try_files $uri $uri/ =404;
    }
}

# ---- app.polyglots.social → Flutter learner app (SPA) ----------------------
server {
    listen 8085;
    server_name app.polyglots1.social;

    root /usr/share/nginx/html/app;
    index index.html;

    # Long-cache hashed Flutter build assets (main.dart.js, *.png, etc.)
    # but never the entrypoint — flutter rewrites index.html on every
    # build and we want clients to pick up new bundles immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ---- dashboard.polyglots.social → Flutter school-admin app (SPA) -----------
server {
    listen 8085;
    server_name dashboard.polyglots1.social;

    root /usr/share/nginx/html/dashboard;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}

