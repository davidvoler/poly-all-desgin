module: 1 
	Lesson: 1
 		words:
		- ك
		sentences:
		- ar: 350 درجة، أليس كذلك؟
		  en: 350 degrees, right? 
		- ar: "Bonjour" تعني مرحبًا، أليس كذلك؟
		  en: "Bonjour" means hello, right? 
		- ar: آسف للضغط عليك.
		  en: I'm sorry to rush you. 
		- ar: آمل أنك دعوت لي.
		  en: I hope you prayed for me. 
		- ar: أبإمكانك أن تقلني إلى محطة القطار؟
		  en: Could you give me a lift to the train station? 
		- ar: أتحدث عنك.
		  en: I'm talking about you. 
		- ar: أتريد مني مساعدتك في ذلك؟
		  en: Do you want me to help you do that? 
		- ar: أتفق معك.
		  en: I agree with you. 
		- ar: أتَ لا يمكنك تحدث الإنجليزية؟
		  en: Are you not able to speak English? 
		- ar: أتمنى أن يكون لديك وقت أكثر لي.
		  en: I wish you had more time for me. 
		- ar: أتوقع مساعدتك.
		  en: I expect your help. 
		- ar: أثق بك.
		  en: I trust you. 
	Lesson: 2
 		words:
		- ل
		sentences:
		- ar: "Shake It Off" لتايلور سويفت.
		  en: "Shake It Off" by Taylor Swift. 
		- ar: آسف لسماع ذلك.
		  en: Sorry to hear that. 
		- ar: آسف لما حدث.
		  en: I'm sorry for what happened. 
		- ar: آسف لمغادرتي بتلك السرعة.
		  en: I'm sorry I have left with such haste. 
		- ar: أبي صارم للغاية.
		  en: My dad is very strict. 
		- ar: أتت لتراني.
		  en: She came to see me. 
		- ar: أتجهّزت لامتحان اليوم؟
		  en: Are you well prepared for today's exam? 
		- ar: أتی عمي لرؤيتي.
		  en: My uncle came to see me. 
		- ar: أُحَاوِلُ تَرْكَ مَكَانٍ لِلتَّحْلِيَة.
		  en: I'm trying to save room for dessert. 
		- ar: أُحَاوِلُ تَرْكَ مَكَانٍ لِلحَلْوَى.
		  en: I'm trying to save room for dessert. 
		- ar: أحبّ سامي ليلى.
		  en: Sami liked Layla. 
		- ar: أخاف سامي ليلى.
		  en: Sami intimidated Layla. 
