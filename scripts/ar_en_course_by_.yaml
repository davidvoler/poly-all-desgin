	Lesson: 6
 		words:
		- ي
		sentences:
		- ar: أحب الاحتفال برأس السنة الجديدة مع عائلتي.
		  en: I love celebrating New Year's Eve with my family. 
		- ar: أحب الاحتفال بعيد الشكر مع عائلتي.
		  en: I love celebrating Thanksgiving with my family. 
		- ar: أحب القراءة وقضاء الوقت مع عائلتي.
		  en: I like to read and spend time with my family. 
		- ar: أحب صنع التاماليز مع عائلتي.
		  en: I love making tamales with my family. 
		- ar: أحب صنع الزلابية مع عائلتي.
		  en: I love making dumplings with my family. 
		- ar: أحب صنع ذكريات مع عائلتي مثل هذه.
		  en: I love making memories with my family like that. 
		- ar: أحس بأن لياقتي عالية.
		  en: I'm feeling fit. 
		- ar: أريد أن أعرف من سيأتي معنا.
		  en: I want to know who is coming with us. 
		- ar: أريد أن أعرف من سيأتي معنا.
		  en: I want to know who's coming with us. 
		- ar: أريد التحدّث مع شقيقتي.
		  en: I want to talk to my sister. 
		- ar: أريد رؤية توم قبل مغادرتي.
		  en: I want to see Tom before I leave. 
		- ar: أشك في أن توم سيأتي.
		  en: I doubt Tom will come. 
