base_locale: en
fallback_strategy: base_locale
input_directory: lib/i18n
input_file_pattern: .i18n.json
output_directory: lib/i18n
output_file_name: translations.g.dart
locale_handling: true
flutter_integration: true
namespaces: false
translate_var: t
enum_name: AppLocale
class_name: Translations
string_interpolation: braces
# Bundle every locale at build time instead of using deferred imports.
# Avoids the async load step in tests and keeps `setLocaleSync` working
# for non-base locales. Acceptable cost for a small set of UI strings.
lazy: false
