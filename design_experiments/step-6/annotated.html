<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Polyglots — Annotated Reading</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../step-1/colors_and_type.css" />
<link rel="stylesheet" href="app.css" />
<style>
  .top.quiz-top {
    margin-bottom: 18px;
    gap: 12px;
  }
  .quiz-progress {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .quiz-progress .progress-bar {
    flex: 1;
    height: 8px;
  }
  .quiz-progress .count {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* Same question nav as quiz */
  .qnav {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding: 6px 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 999px;
  }
  .qnav-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.16);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-default);
    flex-shrink: 0;
  }
  .qnav-btn .ic {
    font-family: var(--font-icon);
    font-size: 16px;
  }
  .qnav .label {
    flex: 1;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
  }

  .prompt-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    text-align: center;
    margin-bottom: 12px;
  }

  /* Reading panel */
  .reading {
    padding: 20px 16px 18px 16px;
    border-radius: 18px;
    text-align: center;
    margin-bottom: 14px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(28px) saturate(140%);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.14);
  }
  .sentence {
    font-family: var(--font-jp);
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    line-height: 1.5;
    letter-spacing: -0.01em;
    text-shadow: 0 4px 18px rgba(0,0,0,0.4);
    margin-bottom: 10px;
  }
  .translation {
    font-size: 12px;
    font-style: italic;
    color: rgba(255,255,255,0.65);
    line-height: 1.4;
  }

  .anno {
    position: relative;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 7px;
    margin: 0 1px;
  }
  .anno.hint {
    background: rgba(255, 183, 77, 0.18);
    box-shadow: inset 0 -2px 0 var(--color-orange-300);
    color: #fff;
  }
  .anno.active {
    background: var(--color-orange-300);
    color: #5a2a00;
    text-shadow: none;
    box-shadow: 0 4px 14px rgba(255, 183, 77, 0.35);
  }

  /* Annotation card */
  .anno-card {
    position: relative;
    padding: 14px 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.96);
    color: var(--fg-strong);
    box-shadow: 0 12px 28px rgba(0,0,0,0.28);
    margin-bottom: 14px;
  }
  .anno-card::before {
    content: "";
    position: absolute;
    top: -7px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 14px; height: 14px;
    background: rgba(255,255,255,0.96);
    border-radius: 3px;
  }
  .anno-card .head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
  }
  .anno-card .word-jp {
    font-family: var(--font-jp);
    font-size: 22px;
    font-weight: 700;
    color: var(--fg-strong);
    letter-spacing: -0.01em;
  }
  .anno-card .reading {
    font-family: var(--font-jp);
    font-size: 13px;
    color: var(--fg-muted);
  }
  .anno-card .romaji {
    font-size: 11px;
    color: var(--fg-subtle);
    font-style: italic;
    margin-left: auto;
  }
  .anno-card .meaning {
    font-size: 13px;
    color: var(--fg-default);
    line-height: 1.45;
    margin-bottom: 10px;
  }
  .anno-card .pos {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--brand-primary);
    margin-bottom: 4px;
  }
  .anno-card .actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .anno-card .pill-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border-default);
    background: #fff;
    color: var(--fg-strong);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-default);
  }
  .anno-card .pill-btn.primary {
    background: var(--brand-primary);
    border-color: var(--brand-primary);
    color: #fff;
  }
  .anno-card .pill-btn .ic {
    font-family: var(--font-icon);
    font-size: 16px;
  }
  .anno-card .saved {
    margin-left: auto;
    color: var(--fg-subtle);
    font-family: var(--font-icon);
    font-size: 20px;
    cursor: pointer;
  }

  .hint-text {
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 12px;
  }
  .hint-text .swatch {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 3px;
    background: var(--color-orange-300);
    vertical-align: -1px;
    margin: 0 4px;
    box-shadow: 0 0 6px rgba(255, 183, 77, 0.5);
  }

  .cta-row {
    margin-top: auto;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="page">

      <div class="top quiz-top">
        <button class="icon-btn" aria-label="Close">close</button>
        <div class="quiz-progress">
          <div class="progress-bar"><div class="fill" style="width:30%"></div></div>
          <div class="count">3 / 10</div>
        </div>
        <button class="icon-btn" aria-label="Settings">tune</button>
      </div>

      <div class="qnav">
        <button class="qnav-btn" aria-label="Previous">
          <span class="ic">arrow_back</span>
          Back
        </button>
        <div class="label">Question 3</div>
        <button class="qnav-btn" aria-label="Skip">
          Skip
          <span class="ic">arrow_forward</span>
        </button>
      </div>

      <div class="prompt-label">— Read &amp; tap the highlighted words —</div>

      <div class="reading">
        <div class="sentence">
          わたしは<span class="anno active">日本語</span>を<span class="anno hint">べんきょう</span>しています。
        </div>
        <div class="translation">"I am studying Japanese."</div>
      </div>

      <div class="anno-card">
        <div class="pos">Noun · にほんご</div>
        <div class="head">
          <span class="word-jp">日本語</span>
          <span class="reading">にほんご</span>
          <span class="romaji">nihongo</span>
        </div>
        <div class="meaning">The Japanese language. Lit. "Japan-language" — used to refer to the spoken/written language itself.</div>
        <div class="actions">
          <button class="pill-btn primary">
            <span class="ic">volume_up</span>
            Play
          </button>
          <button class="pill-btn">
            <span class="ic">menu_book</span>
            Examples
          </button>
          <span class="saved">bookmark_border</span>
        </div>
      </div>

      <div class="hint-text">
        Tap any <span class="swatch"></span> word to learn its meaning &amp; sound.
      </div>

      <div class="cta-row">
        <button class="cta">
          Continue
          <span class="icon">arrow_forward</span>
        </button>
      </div>

    </div>
  </div>
</body>
</html>
