<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--gradient-home);font-family:var(--font-latin);display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
.s{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:100px;height:64px;background:#fff;border:1px solid var(--border-subtle)}
.lbl{font-size:10px;color:var(--fg-muted);font-family:ui-monospace,monospace}
.r4{border-radius:4px}.r8{border-radius:8px}.r12{border-radius:12px}.r16{border-radius:16px}.rp{border-radius:999px}
</style></head><body>
<div class="s"><div class="box r4"></div><div class="lbl">4 · radius-micro</div></div>
<div class="s"><div class="box r8"></div><div class="lbl">8 · radius-chip</div></div>
<div class="s"><div class="box r12"></div><div class="lbl">12 · radius-button</div></div>
<div class="s"><div class="box r16"></div><div class="lbl">16 · radius-card</div></div>
<div class="s"><div class="box rp"></div><div class="lbl">999 · radius-pill</div></div>
</body></html>
