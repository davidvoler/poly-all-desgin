<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Concept 2B — Mosaic Compact (Glass)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../step-1/colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-default);
    background: #0c0f1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px 12px;
  }

  .phone {
    width: 100%;
    max-width: 360px;
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    min-height: 600px;
    background:
      radial-gradient(140% 80% at 50% 100%, #1E88E5 0%, #1565C0 25%, #0D47A1 55%, #0c0f1a 100%);
    box-shadow: 0 22px 60px rgba(0, 0, 0, 0.6);
  }

  /* Mosaic — keep words across the whole canvas; foreground will be glass */
  .mosaic {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    user-select: none;
  }
  .word {
    position: absolute;
    font-family: var(--font-jp);
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  .w1  { top: 4%;   left: -2%;  font-size: 45px; opacity: 0.14; }
  .w2  { top: 8%;   right: 6%;  font-size: 20px; opacity: 0.34; transform: rotate(-2deg); }
  .w3  { top: 17%;  left: 8%;   font-size: 25px; opacity: 0.22; }
  .w4  { top: 24%;  right: -4%; font-size: 62px; opacity: 0.10; }
  .w5  { top: 31%;  left: 4%;   font-size: 15px; opacity: 0.50; }
  .w6  { top: 36%;  right: 12%; font-size: 21px; opacity: 0.26; }
  .w7  { top: 44%;  left: -3%;  font-size: 77px; opacity: 0.09; }
  .w8  { top: 56%;  right: 4%;  font-size: 27px; opacity: 0.24; }
  .w9  { top: 65%;  left: 10%;  font-size: 18px; opacity: 0.46; }
  .w10 { top: 72%;  right: 8%;  font-size: 49px; opacity: 0.13; }
  .w11 { top: 80%;  left: 4%;   font-size: 24px; opacity: 0.32; }
  .w12 { top: 88%;  right: 14%; font-size: 17px; opacity: 0.54; }
  .w13 { top: 92%;  left: 16%;  font-size: 39px; opacity: 0.13; }

  /* Subtle global tint instead of a center dim — keeps gradient mood,
     lets every word stay legible behind translucent cards. */
  .mosaic::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
      rgba(13, 71, 161, 0.18) 0%,
      rgba(13, 71, 161, 0.05) 40%,
      rgba(13, 71, 161, 0.18) 100%);
  }

  .page {
    position: relative;
    padding: 22px 20px 22px 20px;
    min-height: 600px;
    display: flex;
    flex-direction: column;
    color: #fff;
    z-index: 1;
  }

  /* Top bar */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .brand {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .streak {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.18);
    padding: 4px 9px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 600;
    color: #fff;
  }
  .streak .dot {
    width: 6px; height: 6px;
    background: var(--color-orange-300);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--color-orange-300);
  }

  /* Medallion — thin floating ring, transparent core, words show through */
  .medallion {
    position: relative;
    margin: 4px auto 16px auto;
    width: 168px;
    height: 168px;
  }
  .medallion svg { transform: rotate(-90deg); position: absolute; inset: 0; }
  .medallion .glow {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(closest-side, rgba(255,255,255,0.10), transparent 70%);
    filter: blur(10px);
  }
  /* Soft frosted disc inside the ring — not opaque, just a tint */
  .medallion .disc {
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.10);
  }
  .medallion .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .medallion .flag-pair {
    font-size: 13px;
    letter-spacing: 0.30em;
    margin-bottom: 5px;
    opacity: 0.85;
  }
  .medallion .native {
    font-family: var(--font-jp);
    font-size: 44px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.02em;
    text-shadow: 0 4px 18px rgba(0,0,0,0.5);
  }
  .medallion .pct {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    margin-top: 7px;
  }

  /* Course caption — frosted plate so text stays readable over words */
  .course-cap {
    text-align: center;
    margin: 0 auto 16px auto;
    padding: 8px 14px 10px 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.10);
    width: fit-content;
    max-width: 90%;
  }
  .course-cap .lang-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .course-cap h2 {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin: 5px 0 2px 0;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  .course-cap .module {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
  }

  /* Stats — glassier capsule (more blur, less white fill) */
  .stats {
    display: flex;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(28px) saturate(140%);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .seg {
    flex: 1;
    text-align: center;
    padding: 10px 4px;
    border-right: 1px solid rgba(255,255,255,0.10);
  }
  .seg:last-child { border-right: none; }
  .seg .v {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.02em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.30);
  }
  .seg .l {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    margin-top: 4px;
  }
  .stats-label {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    text-align: center;
    margin-bottom: 7px;
  }

  /* Practice button — solid white CTA stays opaque on purpose */
  .cta-row {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .practice {
    flex: 1;
    background: #fff;
    color: var(--brand-primary);
    border: none;
    border-radius: var(--radius-pill);
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.30);
    font-family: var(--font-default);
    transition: transform var(--duration-base) var(--ease-standard);
  }
  .practice:hover { transform: translateY(-2px); }
  .practice .icon {
    font-family: var(--font-icon);
    font-size: 18px;
  }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    font-family: var(--font-icon);
    font-size: 18px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="mosaic">
      <span class="word w1">こんにちは</span>
      <span class="word w2">ありがとう</span>
      <span class="word w3">日本</span>
      <span class="word w4">学校</span>
      <span class="word w5">すみません</span>
      <span class="word w6">食べる</span>
      <span class="word w7">本</span>
      <span class="word w8">先生</span>
      <span class="word w9">はじめまして</span>
      <span class="word w10">水</span>
      <span class="word w11">友達</span>
      <span class="word w12">おはよう</span>
      <span class="word w13">学</span>
    </div>

    <div class="page">

      <div class="top">
        <div class="brand">polyglots</div>
        <div class="streak">
          <span class="dot"></span>
          5 day streak
        </div>
      </div>

      <div class="medallion">
        <div class="glow"></div>
        <div class="disc"></div>
        <svg width="168" height="168" viewBox="0 0 168 168">
          <circle cx="84" cy="84" r="74" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
          <circle cx="84" cy="84" r="74" fill="none" stroke="#fff" stroke-width="3"
            stroke-linecap="round"
            stroke-dasharray="465"
            stroke-dashoffset="256"/>
        </svg>
        <div class="center">
          <div class="flag-pair">🇺🇸 → 🇯🇵</div>
          <div class="native">日本語</div>
          <div class="pct">45% Complete</div>
        </div>
      </div>

      <div class="course-cap">
        <div class="lang-label">Japanese · Nihongo</div>
        <h2>Japanese for Beginners</h2>
        <div class="module">Module 3 · Greetings &amp; Introductions</div>
      </div>

      <div class="stats-label">— Your Vocabulary —</div>
      <div class="stats">
        <div class="seg">
          <div class="v">248</div>
          <div class="l">Words</div>
        </div>
        <div class="seg">
          <div class="v">12</div>
          <div class="l">Lessons</div>
        </div>
        <div class="seg">
          <div class="v">86</div>
          <div class="l">Sentences</div>
        </div>
      </div>

      <div class="cta-row">
        <button class="practice">
          <span class="icon">play_arrow</span>
          Practice Now
        </button>
        <button class="icon-btn" aria-label="Settings">tune</button>
      </div>

    </div>
  </div>
</body>
</html>
