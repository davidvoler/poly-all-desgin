<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Concept 2 — Immersive Native Script</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../step-1/colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-default);
    background: #1a1f2e;
    color: var(--fg-strong);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px;
  }

  .phone {
    width: 100%;
    max-width: 420px;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
    min-height: 860px;
    background:
      radial-gradient(120% 60% at 50% 0%, #1E88E5 0%, #1565C0 35%, #0D47A1 100%);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
  }

  /* Massive native script as the hero */
  .hero-script {
    position: absolute;
    top: 6%;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-jp);
    font-size: 360px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.06);
    line-height: 1;
    letter-spacing: -0.05em;
    user-select: none;
    pointer-events: none;
    white-space: nowrap;
  }

  .page {
    position: relative;
    padding: 32px 28px 32px 28px;
    min-height: 860px;
    display: flex;
    flex-direction: column;
    color: #fff;
    z-index: 1;
  }

  /* Top bar */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 56px;
  }
  .top .brand {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .top .streak {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 6px 12px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 600;
    color: #fff;
  }
  .top .streak .dot {
    width: 8px; height: 8px;
    background: var(--color-orange-300);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--color-orange-300);
  }

  /* Hero block */
  .hero {
    text-align: center;
    margin-top: 20px;
    margin-bottom: 32px;
  }
  .hero .flag-pair {
    font-size: 24px;
    letter-spacing: 0.4em;
    margin-bottom: 18px;
    opacity: 0.9;
  }
  .hero .lang-name {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 8px;
  }
  .hero h1 {
    font-family: var(--font-jp);
    font-size: 96px;
    font-weight: 700;
    margin: 0;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.02em;
    text-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }
  .hero .course {
    font-size: 18px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    margin-top: 16px;
    letter-spacing: -0.01em;
  }
  .hero .module {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    margin-top: 4px;
  }

  /* Stats as floating glass pills */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }
  .pill {
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    padding: 16px 12px;
    text-align: center;
  }
  .pill .v {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .pill .l {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-top: 6px;
  }

  /* Progress arc */
  .arc-wrap {
    text-align: center;
    margin-bottom: 28px;
  }
  .arc {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto;
  }
  .arc svg { transform: rotate(-90deg); }
  .arc .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .arc .pct {
    font-size: 54px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .arc .lbl {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-top: 6px;
  }

  /* Practice button — large rounded glass */
  .cta-row {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .practice {
    flex: 1;
    background: #fff;
    color: var(--brand-primary);
    border: none;
    border-radius: var(--radius-pill);
    padding: 18px 24px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    font-family: var(--font-default);
    transition: transform var(--duration-base) var(--ease-standard);
  }
  .practice:hover { transform: translateY(-2px); }
  .practice .icon {
    font-family: var(--font-icon);
    font-size: 22px;
  }
  .icon-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    font-family: var(--font-icon);
    font-size: 24px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="hero-script">語</div>

    <div class="page">

      <div class="top">
        <div class="brand">polyglots</div>
        <div class="streak">
          <span class="dot"></span>
          5 day streak
        </div>
      </div>

      <div class="hero">
        <div class="flag-pair">🇺🇸 → 🇯🇵</div>
        <div class="lang-name">Japanese · 日本語</div>
        <h1>日本語</h1>
        <div class="course">Japanese for Beginners</div>
        <div class="module">Module 3 · Greetings &amp; Introductions</div>
      </div>

      <div class="arc-wrap">
        <div class="arc">
          <svg width="200" height="200" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="86" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="10"/>
            <circle cx="100" cy="100" r="86" fill="none" stroke="#fff" stroke-width="10"
              stroke-linecap="round"
              stroke-dasharray="540"
              stroke-dashoffset="297"/>
          </svg>
          <div class="center">
            <div class="pct">45%</div>
            <div class="lbl">Course Progress</div>
          </div>
        </div>
      </div>

      <div class="stats">
        <div class="pill">
          <div class="v">248</div>
          <div class="l">Words</div>
        </div>
        <div class="pill">
          <div class="v">12</div>
          <div class="l">Lessons</div>
        </div>
        <div class="pill">
          <div class="v">86</div>
          <div class="l">Sentences</div>
        </div>
      </div>

      <div class="cta-row">
        <button class="practice">
          <span class="icon">play_arrow</span>
          Practice Now
        </button>
        <button class="icon-btn" aria-label="More">tune</button>
      </div>

    </div>
  </div>
</body>
</html>
