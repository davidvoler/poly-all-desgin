<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-latin);display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:center;gap:14px;padding:8px}
.icn{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff}
.txt{flex:1}
.t{font-size:16px;font-weight:600;color:var(--fg-strong)}
.s{font-size:13px;color:var(--fg-muted)}
.sw{position:relative;width:44px;height:26px;background:var(--color-grey-300);border-radius:999px;flex-shrink:0;transition:background .2s}
.sw.on{background:var(--brand-primary)}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on::after{left:21px}
.poly-icon{font-size:22px}
</style></head><body>
<div class="row"><div class="icn" style="background:var(--accent-show-text)"><span class="poly-icon poly-icon--filled">visibility</span></div><div class="txt"><div class="t">Show Text</div><div class="s">Display written text with audio</div></div><div class="sw on"></div></div>
<div class="row"><div class="icn" style="background:var(--accent-auto-play)"><span class="poly-icon poly-icon--filled">volume_up</span></div><div class="txt"><div class="t">Auto Play</div><div class="s">Play audio automatically</div></div><div class="sw on"></div></div>
<div class="row"><div class="icn" style="background:var(--accent-translit)"><span class="poly-icon poly-icon--filled">text_fields</span></div><div class="txt"><div class="t">Transliteration</div><div class="s">Show pronunciation guide</div></div><div class="sw"></div></div>
</body></html>
