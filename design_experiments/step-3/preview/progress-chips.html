<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-latin);display:flex;flex-direction:column;gap:14px}
.bar{height:8px;background:var(--color-grey-200);border-radius:999px;overflow:hidden}
.fill{height:100%;background:var(--brand-primary);border-radius:999px}
.lbl{font-size:13px;color:var(--fg-muted);display:flex;justify-content:space-between}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:var(--color-grey-200);border-radius:8px;font-size:13px;color:var(--fg-strong)}
.row{display:flex;gap:8px;flex-wrap:wrap}
.poly-icon{font-size:16px;color:var(--fg-muted)}
</style></head><body>
<div><div class="lbl"><span>Quiz Progress</span><span>3 of 8</span></div><div class="bar" style="margin-top:6px"><div class="fill" style="width:37%"></div></div></div>
<div><div class="lbl"><span>Progress</span><span>45%</span></div><div class="bar" style="margin-top:6px"><div class="fill" style="width:45%"></div></div></div>
<div class="row">
  <span class="chip"><span class="poly-icon">layers</span>5 modules</span>
  <span class="chip"><span class="poly-icon">school</span>24 lessons</span>
  <span class="chip" style="background:var(--color-blue-50);color:var(--brand-primary-text)"><span class="poly-icon" style="color:var(--brand-primary)">folder</span>Greetings</span>
</div>
</body></html>
