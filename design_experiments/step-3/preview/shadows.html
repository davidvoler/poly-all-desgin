<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:32px;background:#fff;font-family:var(--font-latin);display:flex;gap:32px;align-items:flex-start}
.s{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:160px;height:80px;background:#fff;border-radius:16px}
.lbl{font-size:11px;color:var(--fg-muted);font-family:ui-monospace,monospace;text-align:center}
.t{font-size:13px;font-weight:600;color:var(--fg-strong)}
</style></head><body>
<div class="s"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="t">card</div><div class="lbl">0 4 10 rgba(0,0,0,.10)</div></div>
<div class="s"><div class="box" style="box-shadow:var(--shadow-card-compact)"></div><div class="t">card-compact</div><div class="lbl">0 2 8 rgba(0,0,0,.05)</div></div>
